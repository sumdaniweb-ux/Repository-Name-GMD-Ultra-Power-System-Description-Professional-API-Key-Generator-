<!DOCTYPE html>
<!-- جی ایم ڈی اسپارک | مانیٹر | مالک: بابا سعد میر ہادی -->
<html lang="ur" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>K7 Shield Monitor</title>
<style>body{font-family:system-ui;margin:12px;background:#0a0a0a;color:#e0e0e0}h3{color:#0f0}pre{background:#111;padding:8px;border:1px solid #333;max-height:300px;overflow-y:auto;font-size:12px}button{padding:6px 12px;margin:4px;background:#222;color:#0f0;border:1px solid #444}</style></head>
<body>
<h3>کے 7 شیلڈ مانیٹر</h3>
<button onclick="refresh()">تازہ کریں</button>
<button onclick="wipe()">لاگ صاف کریں</button>
<pre id="out">لوڈ ہو رہا ہے...</pre>
<script>
function refresh(){
  try{
    const raw=localStorage.getItem("k7_shield_log");
    if(raw){
      const d=JSON.parse(raw);
      document.getElementById("out").innerText=d.map(e=>`${new Date(e.t).toLocaleTimeString()} | ${e.type} | ${e.status}`).join("\n");
    }else{document.getElementById("out").innerText="کوئی لاگ نہیں"}
  }catch(e){document.getElementById("out").innerText="خرابی: "+e.message}
}
function wipe(){localStorage.removeItem("k7_shield_log");refresh();}
refresh();
setInterval(refresh,6000);
</script></body></html>
